project:
  type: website
  output-dir: _site
  resources:
    - CNAME
    # Ship every standalone HTML at the root automatically.
    # Convention: prefix scratch/draft files with `_` to exclude them
    # (Quarto treats `_*` as ignored in resources).
    - "*.html"
    - themes.css

website:
  title: "Derek Wakefield"
  description: "Assistant Professor of Political Science, Bucknell University"
  site-url: https://derekwakefield.com
  open-graph: true
  twitter-card: true
  navbar:
    background: light
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Service"
        href: service.qmd
      - text: "CV"
        href: cv.qmd
      - text: "Now"
        href: now.qmd
      - text: "Writing"
        href: writing.qmd
      - text: "Presentations"
        href: presentations.qmd
      - text: "Apps"
        href: apps.qmd
      - text: "Games"
        href: games.qmd
  page-footer:
    left: "© 2026 Derek Wakefield"
    right:
      - icon: envelope
        href: mailto:dw043@bucknell.edu
      - icon: github
        href: https://github.com/DerekSleepfield

format:
  html:
    include-after-body:
      - feedback-bubble.html
      - theme-switcher.html
    theme: cosmo
    css:
      - styles.css
      - themes.css
    toc: true
    toc-location: right
    fig-cap-location: bottom
    code-link: true
    smooth-scroll: true
    link-external-newwindow: true
