<!-- derekwakefield.com — design-direction dropdown widget
     Injected site-wide via `include-after-body` in _quarto.yml.
     CSS lives in themes.css; this file is just markup + 1 small script. -->
<div class="dw-theme-switcher" id="dwThemeSwitcher" aria-label="Design direction">
  <button type="button" class="dw-theme-toggle" id="dwThemeToggle" aria-haspopup="listbox" aria-expanded="false">
    <span class="dw-swatch" id="dwToggleSwatch" style="background:#cccccc"></span>
    <span id="dwToggleLabel">Theme</span>
    <span class="dw-chevron">▾</span>
  </button>
  <div class="dw-theme-panel" id="dwThemePanel" role="listbox">
    <!-- items injected by script for compactness -->
    <div class="dw-divider"></div>
    <a class="dw-what" href="/design-directions.html">What is this? →</a>
  </div>
</div>

<script>
(function () {
  var THEMES = [
    { id: "default",          name: "Site default",     tagline: "Cosmo",          swatch: "#ffffff", dark: false },
    { id: "porch-light",      name: "Porch Light",      tagline: "warm cream",     swatch: "#c9a96e", dark: false },
    { id: "star-chart",       name: "Star Chart",       tagline: "night sky",      swatch: "#fde487", dark: true  },
    { id: "bedrock",          name: "Bedrock",          tagline: "geological",     swatch: "#d4a574", dark: true  },
    { id: "hum",              name: "Hum",              tagline: "soft peach",     swatch: "#8a6b8a", dark: false },
    { id: "bobblesphere",     name: "Bobblesphere",     tagline: "orbital",        swatch: "#ff9d3c", dark: true  },
    { id: "library-bookmark", name: "Library Bookmark", tagline: "card catalog",   swatch: "#8b1a1a", dark: false },
    { id: "mind-palace-map",  name: "Mind Palace Map",  tagline: "antique atlas",  swatch: "#993322", dark: false }
  ];
  var STORAGE_KEY = "dw-theme";

  // Inject items above the existing "What is this?" link
  var panel  = document.getElementById("dwThemePanel");
  var divider = panel.querySelector(".dw-divider");
  THEMES.forEach(function (t) {
    var item = document.createElement("div");
    item.className = "dw-theme-item";
    item.setAttribute("data-theme-id", t.id);
    item.setAttribute("role", "option");
    item.innerHTML =
      '<span class="dw-swatch" style="background:' + t.swatch + '"></span>' +
      '<span class="dw-name">' + t.name + '</span>' +
      '<span class="dw-tagline">' + t.tagline + '</span>';
    panel.insertBefore(item, divider);
  });

  function applyTheme(id) {
    var t = THEMES.find(function (x) { return x.id === id; }) || THEMES[0];
    if (t.id === "default") {
      document.documentElement.removeAttribute("data-theme");
      document.documentElement.removeAttribute("data-bs-theme");
    } else {
      document.documentElement.setAttribute("data-theme", t.id);
      // honor existing dark-mode hooks (e.g. coffee-shop post)
      if (t.dark) document.documentElement.setAttribute("data-bs-theme", "dark");
      else        document.documentElement.removeAttribute("data-bs-theme");
    }
    // Refresh toggle label + swatch
    document.getElementById("dwToggleLabel").textContent = t.name;
    document.getElementById("dwToggleSwatch").style.background = t.swatch;
    // Mark active in panel
    panel.querySelectorAll(".dw-theme-item").forEach(function (el) {
      el.classList.toggle("active", el.getAttribute("data-theme-id") === t.id);
    });
  }

  // Initial apply from localStorage
  var initial = "default";
  try { initial = localStorage.getItem(STORAGE_KEY) || "default"; } catch (e) {}
  applyTheme(initial);

  // Toggle open/close
  var btn = document.getElementById("dwThemeToggle");
  function openPanel() { panel.classList.add("open");  btn.setAttribute("aria-expanded", "true");  }
  function closePanel() { panel.classList.remove("open"); btn.setAttribute("aria-expanded", "false"); }
  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    if (panel.classList.contains("open")) closePanel(); else openPanel();
  });

  // Click item
  panel.addEventListener("click", function (e) {
    var item = e.target.closest(".dw-theme-item");
    if (!item) return;
    var id = item.getAttribute("data-theme-id");
    applyTheme(id);
    try { localStorage.setItem(STORAGE_KEY, id); } catch (err) {}
    closePanel();
  });

  // Close on outside click + ESC
  document.addEventListener("click", function (e) {
    if (!document.getElementById("dwThemeSwitcher").contains(e.target)) closePanel();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closePanel();
  });
})();
</script>

<!-- derekwakefield.com — open-in-new-tab for standalone HTML artifacts
     Each standalone is a self-contained page (game, viz, parable, memo) that
     lives at site root. Listing cards link directly to them via `path:` in
     post frontmatter, but Quarto's link-external-newwindow only fires for
     cross-origin URLs, so same-site standalones would otherwise open in the
     current tab. This rewrites their <a> tags to target="_blank".

     Resilient version: instead of hand-maintaining a whitelist of standalones,
     we derive the *primary* page set (Quarto-generated .qmd pages) from the
     navbar at runtime. Everything else at root ending in .html is standalone. -->
<script>
(function () {
  // Build the primary-page set from the navbar.
  var PRIMARY = new Set();
  document.querySelectorAll('.navbar a.nav-link[href], .navbar a.navbar-brand[href]').forEach(function (a) {
    try {
      var u = new URL(a.getAttribute('href'), window.location.href);
      if (u.origin !== window.location.origin) return;
      var p = u.pathname.replace(/^\/+/, '').replace(/\/$/, '');
      PRIMARY.add(p);                          // e.g. "research.html"
      PRIMARY.add(p.replace(/\.html$/, ''));   // e.g. "research"
    } catch (e) {}
  });
  // Defense in depth: bail if the navbar isn't found, so we don't false-positive
  // primary pages as standalones.
  if (PRIMARY.size === 0) return;

  function isStandalone(href) {
    if (!href) return false;
    try {
      var u = new URL(href, window.location.href);
      if (u.origin !== window.location.origin) return false;
      var path = u.pathname.replace(/^\/+/, "");
      // Must be a single root-level .html file (no subfolders).
      if (!/^[^/]+\.html$/.test(path)) return false;
      if (PRIMARY.has(path) || PRIMARY.has(path.replace(/\.html$/, ""))) return false;
      return true;
    } catch (e) { return false; }
  }

  Array.prototype.forEach.call(document.querySelectorAll("a[href]"), function (a) {
    if (isStandalone(a.getAttribute("href"))) {
      a.setAttribute("target", "_blank");
      a.setAttribute("rel", "noopener");
    }
  });
})();
</script>
